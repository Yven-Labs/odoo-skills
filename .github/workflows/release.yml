name: Release — Publish Skill Library

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from conventional commits
        id: version
        run: |
          set -euo pipefail

          # Get the last STABLE tag (exclude pre-releases: draft, alpha, beta, rc)
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -Ev '\-(draft|alpha|beta|rc)' \
            | head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            echo "ℹ️  No previous stable tag — starting at v0.1.0"
            echo "VERSION=0.1.0" >> "$GITHUB_OUTPUT"
            echo "PREV_TAG=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Previous stable tag: $PREV_TAG"

          # Parse MAJOR.MINOR.PATCH
          CLEAN="${PREV_TAG#v}"
          MAJOR=$(echo "$CLEAN" | cut -d. -f1)
          MINOR=$(echo "$CLEAN" | cut -d. -f2)
          PATCH=$(echo "$CLEAN" | cut -d. -f3)

          # Collect commit subjects AND bodies since last stable tag
          COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s%n%b" 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "⚠️  No commits since $PREV_TAG — skipping release."
            echo "VERSION=${CLEAN}" >> "$GITHUB_OUTPUT"
            echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type by conventional commit rules
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "(^|\n)BREAKING CHANGE[:\!]|(^feat|^fix|^refactor|^chore)\!(\([^)]+\))?:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bump type  : $BUMP"
          echo "New version: v$NEXT_VERSION"
          echo "VERSION=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Check if this version tag already exists
        id: tag_check
        if: ${{ !contains(steps.version.outputs, 'SKIP') }}
        run: |
          set -euo pipefail

          TAG="v${{ steps.version.outputs.VERSION }}"

          if git tag | grep -q "^${TAG}$"; then
            echo "⚠️  Tag $TAG already exists — skipping release creation."
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Tag $TAG is new — proceeding with release."
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package skill library
        if: steps.tag_check.outputs.SKIP == 'false'
        run: |
          set -euo pipefail

          mkdir -p dist

          if [ -d "skills" ]; then
            zip -r "dist/odoo-skills-v${{ steps.version.outputs.VERSION }}.zip" \
              skills/ AGENTS.md README.md LICENSE
            echo "📦 Skills package created:"
            ls -lh dist/
          else
            echo "ℹ️  No skills/ directory yet — creating base release."
            zip -r "dist/odoo-skills-v${{ steps.version.outputs.VERSION }}.zip" \
              AGENTS.md README.md LICENSE
          fi

      - name: Generate release notes
        if: steps.tag_check.outputs.SKIP == 'false'
        run: |
          set -euo pipefail

          PREV_TAG="${{ steps.version.outputs.PREV_TAG }}"

          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --oneline --no-decorate | head -20)
          else
            NOTES=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          fi

          echo "$NOTES" > /tmp/release_notes.txt
          echo "Notes preview:"
          cat /tmp/release_notes.txt

      - name: Create GitHub Release
        if: steps.tag_check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "odoo-skills v${{ steps.version.outputs.VERSION }}"
          body_path: /tmp/release_notes.txt
          files: dist/odoo-skills-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  odoo-skills Release Pipeline Complete"
          echo "  Version: v${{ steps.version.outputs.VERSION }}"
          echo "════════════════════════════════════════"
